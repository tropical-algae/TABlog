name: Release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    concurrency:
      group: ${{ github.workflow }}-release-${{ github.ref_name }}
      cancel-in-progress: false

    outputs:
      released: ${{ steps.semantic.outputs.new_release_published }}
      tag: ${{ steps.semantic.outputs.new_release_version }}

    steps:
      - name: Setup | Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup | Force Branch to Workflow SHA
        run: |
          git reset --hard ${{ github.sha }}

      - name: Setup | Node.js Environment
        uses: actions/setup-node@v6
        with:
          node-version: 24
          # check-latest: true

      - name: Setup | NPM Upgrade
        run: npm install -g npm@11.12.1

      - name: Dependencies | Install Dependencies
        run: npm ci

      - name: Release | Version Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build | Compile Web and Prepare Files
        if: steps.semantic.outputs.new_release_published == 'true'
        env:
          VITE_SITE_TITLE: Reef Flats
        run: |
          npm run build
          rm -rf dist/config_processed/* dist/markdowns_processed/*

      - name: Upload | Save Build Artifacts for Docker
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/
          retention-days: 1

  publish:
    runs-on: ubuntu-latest
    environment: release
    needs: release
    if: needs.release.outputs.released == 'true'

    permissions:
      contents: write

    steps:
      - name: Setup | Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: v${{ needs.release.outputs.tag }}

      - name: Download | Retrieve Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/

      - name: Pack | Archive Static Files
        run: |
          cd dist
          zip -r ../axionara-web-dist.zip ./*
          cd ..

      - name: Publish | Upload Assets to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="v${{ needs.release.outputs.tag }}"
          gh release upload "$TAG_NAME" axionara-web-dist.zip --clobber

      - name: Setup | Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login | Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish | Extract Docker Metadata
        id: docker_meta
        uses: docker/metadata-action@v6
        with:
          images: tropicalalgae/tablog 
          tags: |
            type=raw,value=v${{ needs.release.outputs.tag }}
            type=raw,value=latest

      - name: Publish | Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
